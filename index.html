<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Asset Library</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a0a15 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 600px;
      text-align: center;
    }
    .logo {
      font-size: 80px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 36px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #6C63FF 0%, #9C8FFF 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      color: #aaa;
      margin-bottom: 30px;
    }
    .card {
      background: rgba(22, 33, 62, 0.6);
      border: 1px solid rgba(108, 99, 255, 0.2);
      border-radius: 12px;
      padding: 30px;
      margin-top: 30px;
    }
    .success {
      font-size: 20px;
      color: #6C63FF;
      margin-bottom: 20px;
    }
    .info {
      font-size: 14px;
      line-height: 1.8;
      color: #ccc;
      text-align: left;
    }
    .api-url {
      color: #6C63FF;
      word-break: break-all;
      font-family: monospace;
    }
    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: #6C63FF;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
    .button:hover {
      background: #5A52D5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⬢</div>
    <h1>My Asset Library</h1>
    <p>Personal 3D Asset Management System</p>
    
    <div class="card">
      <div class="success">✅ Deploy Successful!</div>
      <div class="info">
        <p>🎉 Your Asset Library is now live!</p>
        <p>📡 API: <span class="api-url" id="api"></span></p>
        <p>🔧 Use this URL in 3ds Max script</p>
      </div>
      <a href="/api/assets" class="button">Test API →</a>
    </div>
  </div>
  
  <script>
    document.getElementById('api').textContent = window.location.origin + '/api/assets';
  </script>
</body>
</html>
